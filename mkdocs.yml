site_name: Field Notes
site_description: Teaching materials and reasoning notebooks for engineering practice.
site_url: https://engineered-judgment.github.io/field-notes/
repo_url: https://github.com/engineered-judgment/field-notes
repo_name: engineered-judgment/field-notes

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Aspen Plus Notebook: aspen-notebook.md
  - Students:
    - Start Here: start-here.md
    - CBE 253 (Live): contexts/cbe253/index.md
  - Faculty:
    - Adoption Guide: faculty-adoption.md
    - Notebook Template: notebook-template.md
    - Prompts:
      - Overview: prompts/index.md
      - AI Use Policy: prompts/ai-use-policy.md
      - Good Questions: prompts/good-questions.md
      - Evidence Check: prompts/evidence-check.md
    - Rubrics:
      - Overview: rubrics/index.md
      - Reasoning Rubric: rubrics/reasoning-rubric.md
  - Notebooks:
    - Overview: notebooks/index.md
    - 2026:
      - Aspen Process Framing: notebooks/2026/2026-03-aspen-process-framing.md
      - Assumption Failure Map: notebooks/2026/2026-03-assumption-failure-map.md
      - Sensitivity Leverage Scan: notebooks/2026/2026-03-sensitivity-leverage-scan.md
      - Decision Memo: notebooks/2026/2026-03-decision-memo.md
  - Engineering Mindsets:
    - Overview: mindsets/index.md
    - Constraint: mindsets/constraint.md
    - Tradeoff: mindsets/tradeoff.md
    - Approximation: mindsets/approximation.md
    - Systems: mindsets/systems.md
    - Decision: mindsets/decision.md
    - Margin: mindsets/margin.md
    - Satisficing: mindsets/satisficing.md
    - Fragility: mindsets/fragility.md
  - Courses Using This Method:
    - CBE 253: contexts/cbe253/index.md

markdown_extensions:
  - meta
  - admonition
  - toc:
      permalink: true

