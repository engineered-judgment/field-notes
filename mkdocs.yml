site_name: Field Notes
site_description: Teaching materials and reasoning notebooks for engineering practice.
site_url: https://engineered-judgment.github.io/field-notes/
repo_url: https://github.com/engineered-judgment/field-notes
repo_name: engineered-judgment/field-notes

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home:
    - Overview: index.md
  - Warrant: warrant.md
  - Students:
    - Choose Your Path: students/index.md
  - Faculty:
    - Adoption Guide: faculty-adoption.md
    - Warrant Template: warrant-template.md
    - Prompt Kits:
      - Overview: prompts/index.md
      - AI Use Policy: prompts/ai-use-policy.md
      - Good Questions: prompts/good-questions.md
      - Evidence Check: prompts/evidence-check.md
    - Rubrics:
      - Overview: rubrics/index.md
      - Reasoning Rubric: rubrics/reasoning-rubric.md
  - Courses Using This Method:
    - CBE 253 Overview: contexts/cbe253/index.md
    - HW1 - Mixers and Splitters: notebooks/cbe253/hw1-mixers-and-splitters.md
    - HW2 - Rankine Cycle: notebooks/cbe253/hw2-pressure-and-temperature-changers.md
    - HW3 - Flash Separators: notebooks/cbe253/hw3-flash-separators.md
    - HW4 - Distillation DSTWU: notebooks/cbe253/hw4-distillation-dstwu.md
    - HW5 - Reactor and Distillation: notebooks/cbe253/hw5-reactor-and-distillation.md
    - HW6 - Properties and Ternary Analysis: notebooks/cbe253/hw6-property-methods.md
    - Cross-Domain:
      - Facilities Energy Retrofit: notebooks/2026/2026-03-facilities-energy-retrofit-decision.md

markdown_extensions:
  - meta
  - admonition
  - toc:
      permalink: true
