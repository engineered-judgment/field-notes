<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Field Notes</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #1f2a37;
      --muted: #5b6672;
      --accent: #0f766e;
      --card: #ffffff;
      --line: #d1d5db;
    }
    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      background: radial-gradient(circle at top right, #e8f5f3, var(--bg));
      color: var(--ink);
      line-height: 1.6;
    }
    main {
      max-width: 820px;
      margin: 8vh auto;
      padding: 2rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 0.02em;
    }
    p {
      color: var(--muted);
      margin: 0.8rem 0;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    a:hover {
      border-bottom-color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Field Notes</h1>
      <p>Clean. Independent. Academic.</p>
      <p>Teaching materials and reasoning notebooks for engineering practice.</p>
      <p><a href="./aspen-notebook.html">Open Aspen Notebook</a></p>
    </section>
  </main>
</body>
</html>
